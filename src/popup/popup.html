<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiffCast</title>
<style>
  :root {
    --bg:       #060811;
    --surface:  #0b0d1d;
    --panel:    #0f1226;
    --border:   #1a2040;
    --text:     #aab4d0;
    --dim:      #3d4868;
    --bright:   #e2e8f8;
    --accent:   #4f6ef7;
    --risk-hi:  #cf222e;
    --risk-lo:  #1a7f37;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 13px;
    width: 300px;
    min-height: 200px;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .logo-orb {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(79,110,247,0.5);
  }
  .logo {
    font-family: 'Syne', system-ui, sans-serif;
    font-weight: 800; font-size: 14px; letter-spacing: -0.02em;
    color: var(--bright);
  }
  .version { margin-left: auto; font-size: 10px; color: var(--dim); font-family: monospace; }

  .section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .section-label {
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--dim); margin-bottom: 8px;
  }

  /* Status indicator */
  .status-row { display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.connected    { background: var(--risk-lo); box-shadow: 0 0 6px var(--risk-lo); }
  .status-dot.disconnected { background: var(--dim); }
  .status-text { font-size: 12px; }
  .status-user { color: var(--bright); font-weight: 500; }

  /* Token input */
  .token-form { display: flex; flex-direction: column; gap: 8px; }
  .token-input {
    width: 100%;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 5px; padding: 7px 10px;
    color: var(--bright); font-family: monospace; font-size: 11.5px;
    outline: none; transition: border-color 0.15s;
  }
  .token-input:focus { border-color: var(--accent); }
  .token-input::placeholder { color: var(--dim); }
  .token-hint { font-size: 10px; color: var(--dim); line-height: 1.4; }
  .token-hint a { color: var(--accent); text-decoration: none; }

  .btn {
    width: 100%; padding: 8px;
    background: var(--accent); border: none; border-radius: 5px;
    color: white; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.88; }
  .btn.secondary {
    background: transparent; border: 1px solid var(--border);
    color: var(--text);
  }
  .btn.danger { background: var(--risk-hi); }

  /* Tier badge */
  .tier-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; border: 1px solid;
  }
  .tier-badge.free { color: var(--dim); border-color: var(--border); }
  .tier-badge.pro  { color: var(--accent); border-color: rgba(79,110,247,0.4); background: rgba(79,110,247,0.08); }

  .upgrade-cta {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .cta-headline { font-size: 12px; font-weight: 600; color: var(--bright); }
  .cta-features { font-size: 11px; color: var(--dim); line-height: 1.6; }
  .cta-features li { list-style: none; }
  .cta-features li::before { content: '→ '; color: var(--accent); }

  .error-msg { font-size: 11px; color: var(--risk-hi); margin-top: 4px; display: none; }
  .error-msg.show { display: block; }

  .footer {
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-link { font-size: 10px; color: var(--dim); cursor: pointer; }
  .footer-link:hover { color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="logo-orb"></div>
  <span class="logo">DiffCast</span>
  <span class="version">v0.1.0</span>
</div>

<!-- Connection status -->
<div class="section" id="statusSection">
  <div class="section-label">GitHub connection</div>
  <div class="status-row">
    <div class="status-dot disconnected" id="statusDot"></div>
    <span class="status-text" id="statusText">Not connected</span>
  </div>
</div>

<!-- Token input (shown when not connected) -->
<div class="section" id="tokenSection">
  <div class="section-label">GitHub token</div>
  <div class="token-form">
    <input
      class="token-input"
      id="tokenInput"
      type="password"
      placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
      autocomplete="off"
      spellcheck="false"
    >
    <div class="token-hint">
      Needs <code>repo</code> scope.
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=DiffCast" target="_blank">
        Generate token →
      </a>
    </div>
    <div class="error-msg" id="tokenError">— </div>
    <button class="btn" id="connectBtn">Connect</button>
  </div>
</div>

<!-- Tier / upgrade (shown when connected) -->
<div class="section" id="tierSection" style="display:none">
  <div class="section-label">Plan</div>
  <span class="tier-badge free" id="tierBadge">FREE</span>

  <div class="upgrade-cta" id="upgradeCta" style="margin-top:10px">
    <div class="cta-headline">Unlock Pro — $7/month</div>
    <ul class="cta-features">
      <li>Unlimited commits &amp; files</li>
      <li>Author churn history</li>
      <li>Complexity delta scoring</li>
      <li>Export replay as GIF</li>
      <li>Custom risk weight profiles</li>
    </ul>
    <button class="btn" id="upgradeBtn">Upgrade to Pro →</button>
  </div>

  <button class="btn secondary" id="disconnectBtn" style="margin-top:10px">
    Disconnect GitHub
  </button>
</div>

<div class="footer">
  <span class="footer-link" id="docsLink">Documentation</span>
  <span class="footer-link" id="feedbackLink">Report issue</span>
</div>

<script src="popup.js" type="module"></script>
</body>
</html>
